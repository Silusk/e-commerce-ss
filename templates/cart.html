<!DOCTYPE html>
<html>

<head>

<title>Cart</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

<h1 class="text-4xl text-center mt-10 font-bold">
Shopping Cart
</h1>

<div id="cartItems" class="max-w-xl mx-auto mt-10 space-y-4"></div>

<h2 id="total" class="text-2xl text-center mt-10 font-bold"></h2>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let container = document.getElementById("cartItems");

let total = 0;

if(cart.length === 0){
container.innerHTML="<p class='text-center'>Cart is empty</p>";
}

cart.forEach(item => {

total += item.price;

let div=document.createElement("div");

div.className="p-4 bg-white rounded shadow flex gap-4 items-center";

div.innerHTML=`

<img src="${item.image}" class="w-20 h-20 rounded object-cover">

<div>
<h2 class="text-xl font-semibold">${item.name}</h2>
<p class="text-gray-600">$${item.price}</p>
</div>

`;

container.appendChild(div);

});

document.getElementById("total").innerText="Total: $"+total;

</script>

</body>

</html>
